name: Configure Dagster Plus Environment

on:
  workflow_dispatch:
    inputs:
      deployment:
        description: "Dagster Cloud deployment to configure"
        type: string
        required: true
        default: "prod"

jobs:
  configure_dagster_plus_env:
    name: Configure Dagster Plus Env
    runs-on: ubuntu-22.04
    env:
      DAGSTER_CLOUD_ORGANIZATION: "twogbio"
      DAGSTER_CLOUD_URL: "https://twogbio.dagster.cloud"
      DAGSTER_CLOUD_DEPLOYMENT: ${{ inputs.deployment }}
      DAGSTER_PLUS_ENV_API_TOKEN: ${{ secrets.DAGSTER_PLUS_ENV_API_TOKEN }}
      HSA_DATABASE_URL: ${{ secrets.HSA_DATABASE_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
      HSA_CONTACT_EMAIL: "poppa@bradyandgraffiti.com"
      HSA_FULL_TEXT_REQUEST_TIMEOUT_SECONDS: "8"
      HSA_FULL_TEXT_REQUEST_ATTEMPTS: "1"
      HSA_FULL_TEXT_FETCH_TIME_BUDGET_SECONDS: "120"
      HSA_PMC_OA_MAX_CANDIDATE_RECORDS: "20"
      HSA_EMBEDDING_MODEL: "openrouter:openai/text-embedding-3-large"
      HSA_THERAPY_COMMITTEE_TIMEOUT_SECONDS: "60"
      HSA_THERAPY_COMMITTEE_MAX_TOKENS: "3500"
      HSA_THERAPY_COMMITTEE_WORKERS: "4"
      HSA_THERAPY_COMMITTEE_MODEL: "anthropic/claude-sonnet-4.6"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Validate required secrets
        run: |
          if [ -z "$DAGSTER_PLUS_ENV_API_TOKEN" ]; then
            echo "::error::DAGSTER_PLUS_ENV_API_TOKEN is not configured. This must be a Dagster+ token from a user with Editor, Admin, or Organization Admin permissions."
            exit 1
          fi
          if [ -z "$HSA_DATABASE_URL" ]; then
            echo "::error::HSA_DATABASE_URL is not configured as a GitHub Actions secret."
            exit 1
          fi
        shell: bash

      - name: Install project dependencies
        run: uv sync

      - name: Configure Dagster Plus CLI
        run: |
          uv run dg plus config set \
            --organization "$DAGSTER_CLOUD_ORGANIZATION" \
            --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
            --url "$DAGSTER_CLOUD_URL" \
            --api-token "$DAGSTER_PLUS_ENV_API_TOKEN"
        shell: bash

      - name: Set full and branch environment variables
        run: |
          create_env() {
            local scope="$1"
            shift
            uv run dg plus create env "$@" \
              --global \
              --scope "$scope" \
              --yes \
              --target-path .
          }

          for scope in full branch; do
            create_env "$scope" HSA_STORAGE_BACKEND postgres
            create_env "$scope" HSA_DATABASE_URL --from-local-env
            create_env "$scope" HSA_CONTACT_EMAIL "$HSA_CONTACT_EMAIL"
            create_env "$scope" HSA_FULL_TEXT_REQUEST_TIMEOUT_SECONDS "$HSA_FULL_TEXT_REQUEST_TIMEOUT_SECONDS"
            create_env "$scope" HSA_FULL_TEXT_REQUEST_ATTEMPTS "$HSA_FULL_TEXT_REQUEST_ATTEMPTS"
            create_env "$scope" HSA_FULL_TEXT_FETCH_TIME_BUDGET_SECONDS "$HSA_FULL_TEXT_FETCH_TIME_BUDGET_SECONDS"
            create_env "$scope" HSA_PMC_OA_MAX_CANDIDATE_RECORDS "$HSA_PMC_OA_MAX_CANDIDATE_RECORDS"
            create_env "$scope" HSA_EMBEDDING_MODEL "$HSA_EMBEDDING_MODEL"
            create_env "$scope" HSA_THERAPY_COMMITTEE_TIMEOUT_SECONDS "$HSA_THERAPY_COMMITTEE_TIMEOUT_SECONDS"
            create_env "$scope" HSA_THERAPY_COMMITTEE_MAX_TOKENS "$HSA_THERAPY_COMMITTEE_MAX_TOKENS"
            create_env "$scope" HSA_THERAPY_COMMITTEE_WORKERS "$HSA_THERAPY_COMMITTEE_WORKERS"
            create_env "$scope" HSA_THERAPY_COMMITTEE_MODEL "$HSA_THERAPY_COMMITTEE_MODEL"

            if [ -n "$OPENROUTER_API_KEY" ]; then
              create_env "$scope" OPENROUTER_API_KEY --from-local-env
            else
              echo "::warning::OPENROUTER_API_KEY is not configured as a GitHub Actions secret; OpenRouter review modes will not run in Dagster+."
            fi

            if [ -n "$TWITTERAPI_IO_KEY" ]; then
              create_env "$scope" TWITTERAPI_IO_KEY --from-local-env
            else
              echo "::warning::TWITTERAPI_IO_KEY is not configured as a GitHub Actions secret; X topic monitoring will stay disabled in Dagster+."
            fi
          done
        shell: bash
