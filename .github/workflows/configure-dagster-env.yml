name: Configure Dagster Plus Environment

on:
  workflow_dispatch:

jobs:
  configure_dagster_plus_env:
    name: Configure Dagster Plus Env
    runs-on: ubuntu-22.04
    env:
      DAGSTER_CLOUD_ORGANIZATION: "twogbio"
      DAGSTER_CLOUD_URL: "https://twogbio.dagster.cloud"
      DAGSTER_CLOUD_DEPLOYMENT: "prod"
      DAGSTER_PLUS_ENV_API_TOKEN: ${{ secrets.DAGSTER_PLUS_ENV_API_TOKEN }}
      HSA_DATABASE_URL: ${{ secrets.HSA_DATABASE_URL }}
      HSA_CONTACT_EMAIL: "poppa@bradyandgraffiti.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Validate required secrets
        run: |
          if [ -z "$DAGSTER_PLUS_ENV_API_TOKEN" ]; then
            echo "::error::DAGSTER_PLUS_ENV_API_TOKEN is not configured. This must be a Dagster+ token from a user with Editor, Admin, or Organization Admin permissions."
            exit 1
          fi
          if [ -z "$HSA_DATABASE_URL" ]; then
            echo "::error::HSA_DATABASE_URL is not configured as a GitHub Actions secret."
            exit 1
          fi
        shell: bash

      - name: Install project dependencies
        run: uv sync

      - name: Configure Dagster Plus CLI
        run: |
          uv run dg plus config set \
            --organization "$DAGSTER_CLOUD_ORGANIZATION" \
            --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
            --url "$DAGSTER_CLOUD_URL" \
            --api-token "$DAGSTER_PLUS_ENV_API_TOKEN"
        shell: bash

      - name: Set production environment variables
        run: |
          uv run dg plus create env HSA_STORAGE_BACKEND postgres \
            --global \
            --scope full \
            --yes \
            --target-path .

          uv run dg plus create env HSA_DATABASE_URL \
            --from-local-env \
            --global \
            --scope full \
            --yes \
            --target-path .

          uv run dg plus create env HSA_CONTACT_EMAIL "$HSA_CONTACT_EMAIL" \
            --global \
            --scope full \
            --yes \
            --target-path .
        shell: bash
