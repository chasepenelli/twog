name: Build TWOG MD Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - ".github/workflows/build-md-worker.yml"
      - "runpod_workers/md_smoke/**"
  pull_request:
    paths:
      - ".github/workflows/build-md-worker.yml"
      - "runpod_workers/md_smoke/**"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/chasepenelli/twog-md-worker
  WORKER_DIR: runpod_workers/md_smoke

jobs:
  build-test-publish:
    name: Build, test, and publish worker image
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local test image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKER_DIR }}
          platforms: linux/amd64
          load: true
          tags: twog-md-worker:test

      - name: Run positive-control worker test
        run: |
          docker run --rm twog-md-worker:test \
            python /app/src/handler.py /app/test_input_positive_control.json \
            > positive-control-output.json
          python - <<'PY'
          import json
          payload = json.load(open("positive-control-output.json", encoding="utf-8"))
          if payload.get("status") != "completed":
              raise SystemExit(json.dumps(payload, indent=2)[:4000])
          stages = {stage.get("stage"): stage.get("status") for stage in payload.get("stages", [])}
          if stages.get("ligand_3d") != "completed" or stages.get("ligand_pdbqt") != "completed":
              raise SystemExit(json.dumps(payload, indent=2)[:4000])
          PY

      - name: Run pazopanib/KDR ligand-prep worker test
        run: |
          docker run --rm twog-md-worker:test \
            python /app/src/handler.py /app/test_input_pazopanib_kdr.json \
            > pazopanib-kdr-output.json
          python - <<'PY'
          import json
          payload = json.load(open("pazopanib-kdr-output.json", encoding="utf-8"))
          if payload.get("status") != "completed":
              raise SystemExit(json.dumps(payload, indent=2)[:4000])
          stages = {stage.get("stage"): stage.get("status") for stage in payload.get("stages", [])}
          if stages.get("ligand_3d") != "completed" or stages.get("ligand_pdbqt") != "completed":
              raise SystemExit(json.dumps(payload, indent=2)[:4000])
          PY

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GHCR image
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKER_DIR }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:smoke-v1
