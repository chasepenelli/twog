                  {
                      "source_key": query.source_key,
                      "query_name": query.query_name,
                      "query_text": query.query_text[:300],
                  }
                  for query in sorted(source_queries, key=lambda value: (value.source_key, value.query_name))[:25]
              ],
          }
          print(json.dumps(payload, indent=2, sort_keys=True))

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("### Research program evidence-loop work\n")
                  summary.write(f"- Program: `{payload['program_id']}` {payload['program_title'] or ''}\n")
                  summary.write(f"- Loop number: `{payload['loop_number']}`\n")
                  summary.write(f"- Brief queue items: `{payload['queue_item_count']}`\n")
                  summary.write(f"- Research leads: `{payload['research_lead_count']}`\n")
                  summary.write(f"- Source queries: `{payload['source_query_count']}`\n")
