      - name: Print hosted command center report
        if: ${{ always() && inputs.job == 'command_center_job' }}
        continue-on-error: true
        run: |
          uv run python - <<'PY'
          import json
          import os

          from hsa_research.ingestion_bridge.contracts import CommandCenterRequest
          from hsa_research.ingestion_bridge.service import HSAResearchService
          from hsa_research.ingestion_bridge.storage import build_research_repository

          report = HSAResearchService(build_research_repository()).build_command_center_report(
              CommandCenterRequest(
                  queue_limit=25,
                  lead_limit=25,
                  agent_run_limit=25,
              )
          ).model_dump(mode="json")
          print(json.dumps(report, indent=2, sort_keys=True))

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          if summary_path:
              summary = report.get("summary", {})
              recommendations = report.get("recommendations", [])
              with open(summary_path, "a", encoding="utf-8") as handle:
                  handle.write("### TWOG command center\n")
                  handle.write(f"- Brief queue ready: `{summary.get('brief_queue_ready')}`\n")
                  handle.write(f"- Brief queue failed: `{summary.get('brief_queue_failed')}`\n")
                  handle.write(f"- Actionable research leads: `{summary.get('research_leads_actionable')}`\n")
                  handle.write(f"- Recent agent failures: `{summary.get('recent_agent_failures')}`\n")
                  handle.write(f"- Blocking recommendations: `{summary.get('blocking_recommendations')}`\n")
                  handle.write("#### Recommendations\n")
                  if not recommendations:
                      handle.write("- None\n")
                  for item in recommendations[:10]:
                      handle.write(
                          f"- `{item.get('severity')}` `{item.get('area')}`: "
                          f"{item.get('action')} ({item.get('job_name') or 'no job'})\n"
                      )
          PY
        shell: bash
