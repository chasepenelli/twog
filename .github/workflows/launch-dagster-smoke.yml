          import json
          import os
          from uuid import UUID

          from hsa_research.ingestion_bridge.service import HSAResearchService
          from hsa_research.ingestion_bridge.storage import build_research_repository

          def _configured_brief_id() -> UUID | None:
              raw_config = os.getenv("DAGSTER_CLOUD_CONFIG_JSON") or ""
              if not raw_config:
                  return None
              try:
                  config = json.loads(raw_config)
              except json.JSONDecodeError:
                  return None
              ops = config.get("ops") or {}
              report_config = (
                  (ops.get("research_brief_evaluation_report") or {}).get("config")
                  or (ops.get("research_brief_evaluation_library_report") or {}).get("config")
                  or {}
              )
              brief_id = report_config.get("brief_id")
              return UUID(brief_id) if brief_id else None

          service = HSAResearchService(build_research_repository())
          brief_id = _configured_brief_id()
          evaluations = service.list_research_brief_evaluations(brief_id=brief_id, limit=10)
          rows = []
          for record in evaluations:
              payload = record.result_payload or {}
              rows.append(
                  {
                      "evaluation_id": str(record.evaluation_id),
                      "brief_id": str(record.brief_id),
                      "agent_run_id": str(record.agent_run_id) if record.agent_run_id else None,
                      "source_key": record.source_key,
                      "topic": record.topic[:300],
                      "overall_score": record.overall_score,
                      "passes_quality_bar": record.passes_quality_bar,
                      "readiness": record.readiness,
                      "recommendations": list(payload.get("recommendations") or [])[:3],
                      "recommendation_count": len(payload.get("recommendations") or []),
                      "strength_count": len(payload.get("strengths") or []),
                      "weaknesses": list(payload.get("weaknesses") or [])[:3],
                      "weakness_count": len(payload.get("weaknesses") or []),
                      "errors": list(record.errors)[:3],
                      "error_count": len(record.errors),
                      "created_at": record.created_at.isoformat(),
                  }
              )
          report = {
              "brief_id": str(brief_id) if brief_id else None,
              "evaluation_count": len(rows),
              "evaluations": rows,
          }
          print(json.dumps(report, indent=2, sort_keys=True))

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("### Research brief evaluation summary\n")
                  summary.write(f"- Brief filter: `{report['brief_id'] or 'none'}`\n")
