      - name: Print hosted validation request queue summary
        if: ${{ always() && (inputs.job == 'validation_request_queue_job' || inputs.job == 'validation_request_queue_library_job' || inputs.job == 'therapy_committee_validation_queue_job') }}
        continue-on-error: true
        run: |
          uv run python - <<'PY'
          import json
          import os
          from uuid import UUID

          from hsa_research.ingestion_bridge.contracts import ValidationRequestQueueRequest
          from hsa_research.ingestion_bridge.service import HSAResearchService
          from hsa_research.ingestion_bridge.storage import build_research_repository

          def _parse_uuid(value: str | None) -> UUID | None:
              return UUID(value) if value else None

          raw_config = os.getenv("DAGSTER_CLOUD_CONFIG_JSON") or "{}"
          try:
              config = json.loads(raw_config)
          except json.JSONDecodeError:
              config = {}
          ops = config.get("ops") or {}
          report_config = (
              (ops.get("validation_request_queue_report") or {}).get("config")
              or (ops.get("validation_request_queue_library_report") or {}).get("config")
              or {}
          )
          plan_id = _parse_uuid(report_config.get("plan_id"))
          status = report_config.get("status")
          statuses = report_config.get("statuses") or None
          source_key = report_config.get("source_key")
          task_type = report_config.get("task_type")
          topic_query = report_config.get("topic_query")
          limit = int(report_config.get("limit") or 25)

          service = HSAResearchService(build_research_repository())
          dry_run = bool(report_config.get("dry_run", False))
          task_ids = [
              UUID(value)
              for value in report_config.get("task_ids", [])
          ]
          preview = None
          if os.getenv("DAGSTER_CLOUD_JOB") == "validation_request_queue_job" and dry_run and plan_id:
              preview = service.queue_validation_requests_from_plan(
                  ValidationRequestQueueRequest(
                      plan_id=plan_id,
                      task_ids=task_ids,
                      dry_run=True,
                  )
              )
              items = preview.queue_items
          else:
              items = service.list_validation_request_queue_items(
                  plan_id=plan_id,
                  status=status,
                  statuses=statuses,
                  source_key=source_key,
                  task_type=task_type,
                  topic_query=topic_query,
                  limit=limit,
              )
          rows = []
          for item in items:
              request = item.validation_request.model_dump(mode="json")
              rows.append(
                  {
                      "queue_item_id": str(item.queue_item_id),
                      "status": item.status,
                      "priority": item.priority,
                      "plan_id": str(item.plan_id),
                      "task_id": str(item.task_id),
                      "task_type": item.task_type,
                      "title": item.title[:300],
                      "validation_type": request.get("validation_type"),
                      "target_name": request.get("target_name"),
                      "candidate_name": request.get("candidate_name"),
                      "source_key": item.source_key,
                      "attempts": item.attempts,
                      "last_run_id": str(item.last_run_id) if item.last_run_id else None,
                      "last_error": item.last_error,
                      "created_at": item.created_at.isoformat(),
                  }
              )
          report = {
              "plan_id": str(plan_id) if plan_id else None,
              "status": status,
              "statuses": statuses or [],
              "source_key": source_key,
              "task_type": task_type,
              "dry_run": dry_run,
              "candidate_task_count": preview.candidate_task_count if preview else None,
              "queued_count": preview.queued_count if preview else None,
              "existing_count": preview.existing_count if preview else None,
              "skipped_count": preview.skipped_count if preview else None,
              "errors": preview.errors if preview else [],
              "queue_item_count": len(rows),
              "queue_items": rows,
          }
          print(json.dumps(report, indent=2, sort_keys=True))

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("### Validation request queue summary\n")
                  summary.write(f"- Plan filter: `{report['plan_id'] or 'none'}`\n")
                  summary.write(f"- Dry run: `{report['dry_run']}`\n")
                  if report["candidate_task_count"] is not None:
                      summary.write(f"- Candidate tasks: `{report['candidate_task_count']}`\n")
                      summary.write(f"- Existing items: `{report['existing_count']}`\n")
                      summary.write(f"- Skipped: `{report['skipped_count']}`\n")
                  summary.write(f"- Queue items sampled: `{report['queue_item_count']}`\n")
                  for row in rows[:10]:
                      summary.write(
                          f"- `{row['status']}` `{row['queue_item_id']}`: "
                          f"{row['validation_type']} {row['target_name'] or row['candidate_name'] or ''} "
                          f"(priority={row['priority']}, task={row['task_type']})\n"
                      )
          PY
        shell: bash

