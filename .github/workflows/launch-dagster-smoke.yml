      - name: Print hosted source follow-up ingest summary
        if: ${{ always() && (inputs.job == 'source_followup_ingest_job' || inputs.job == 'pubmed_source_followup_ingest_job' || inputs.job == 'crossref_source_followup_ingest_job' || inputs.job == 'pmc_oa_source_followup_ingest_job' || inputs.job == 'clinicaltrials_gov_source_followup_ingest_job' || inputs.job == 'unpaywall_source_followup_ingest_job') }}
        continue-on-error: true
        run: |
          uv run python - <<'PY'
          import json
          import os
          from collections import Counter

          from hsa_research.ingestion_bridge.storage import build_research_repository

          lane_sources = {
              "pubmed_source_followup_ingest_job": "pubmed",
              "crossref_source_followup_ingest_job": "crossref",
              "pmc_oa_source_followup_ingest_job": "pmc_oa",
              "clinicaltrials_gov_source_followup_ingest_job": "clinicaltrials_gov",
              "unpaywall_source_followup_ingest_job": "unpaywall",
          }
          source_filter = lane_sources.get(os.environ.get("DAGSTER_CLOUD_JOB", ""))
          repository = build_research_repository()
          items = []
          for status in ("ingested", "failed", "queued", "approved", "skipped"):
              items.extend(repository.list_source_followups(source_key=source_filter, status=status, limit=50))
          deduped = {item.followup_id: item for item in items}
          ordered = sorted(
              deduped.values(),
              key=lambda item: item.updated_at,
              reverse=True,
          )
          counts_by_status = Counter(item.status for item in ordered)
          counts_by_source = Counter(item.source_key for item in ordered)
          payload = {
              "source_filter": source_filter,
              "total_items_sampled": len(ordered),
              "counts_by_status": dict(sorted(counts_by_status.items())),
              "counts_by_source": dict(sorted(counts_by_source.items())),
              "recent_items": [
                  {
                      "followup_id": str(item.followup_id),
                      "source_key": item.source_key,
                      "identifier_type": item.identifier_type,
                      "identifier": item.identifier,
                      "status": item.status,
                      "attempts": item.attempts,
                      "updated_at": item.updated_at.isoformat(),
                      "last_error": item.last_error,
                      "last_ingestion_totals": (
                          item.metadata.get("last_ingestion_report", {}).get("totals")
                          or {
                              "raw_records": item.metadata.get("last_ingestion_report", {}).get("raw_records"),
                              "research_objects": item.metadata.get("last_ingestion_report", {}).get("research_objects"),
                              "document_chunks": item.metadata.get("last_ingestion_report", {}).get("document_chunks"),
                          }
                          if isinstance(item.metadata.get("last_ingestion_report"), dict)
                          else {}
                      ),
                  }
                  for item in ordered[:25]
              ],
          }
          print(json.dumps(payload, indent=2, sort_keys=True))

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("### Source follow-up ingest summary\n")
                  if payload["source_filter"]:
                      summary.write(f"- Source filter: `{payload['source_filter']}`\n")
                  summary.write(f"- Items sampled: {payload['total_items_sampled']}\n")
                  summary.write(f"- By status: `{dict(sorted(counts_by_status.items()))}`\n")
                  summary.write(f"- By source: `{dict(sorted(counts_by_source.items()))}`\n")
          PY
        shell: bash

