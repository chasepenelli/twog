name: Launch Dagster Smoke Job

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Dagster job to launch"
        type: choice
        required: true
        default: "structured_source_smoke_job"
        options:
          - "structured_source_smoke_job"
          - "structured_source_multisource_smoke_job"
          - "literature_clinical_smoke_job"
          - "all_api_smoke_job"
          - "literature_corpus_harvest_job"
          - "literature_full_text_refresh_job"
          - "europe_pmc_full_text_refresh_job"
          - "pmc_oa_full_text_refresh_job"
          - "literature_full_text_ingest_smoke_job"
          - "europe_pmc_full_text_ingest_job"
          - "pmc_oa_full_text_ingest_job"
          - "literature_full_text_smoke_job"
          - "structured_source_count_report_job"
          - "source_health_report_job"
          - "full_text_ops_agent_job"
          - "x_topic_monitor_review_job"
          - "x_linked_article_followup_job"
          - "x_linked_article_review_job"
          - "source_followup_queue_job"
          - "source_followup_ingest_job"
          - "full_text_source_date_ops_job"
          - "entity_resolution_job"
          - "embedding_index_job"
          - "embedding_maintenance_job"
          - "structured_source_pipeline_job"
      config_json:
        description: "Optional Dagster run config JSON"
        type: string
        required: false
        default: ""
      timeout_seconds:
        description: "Maximum seconds to wait for the Dagster run before failing and requesting termination"
        type: string
        required: true
        default: "2700"
      deployment:
        description: "Dagster Cloud deployment to launch against"
        type: string
        required: true
        default: "prod"
      x_linked_article_urls:
        description: "Optional comma/newline/JSON-list URLs for x_linked_article_followup_job manual validation"
        type: string
        required: false
        default: ""

jobs:
  launch_dagster_smoke:
    name: Launch Dagster Smoke Job
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      DAGSTER_CLOUD_ORGANIZATION: "twogbio"
      DAGSTER_CLOUD_URL: "https://twogbio.dagster.cloud"
      DAGSTER_CLOUD_DEPLOYMENT: ${{ inputs.deployment }}
      DAGSTER_PLUS_ENV_API_TOKEN: ${{ secrets.DAGSTER_PLUS_ENV_API_TOKEN }}
      DAGSTER_CLOUD_LOCATION: "hsa-dagster"
      DAGSTER_CLOUD_JOB: ${{ inputs.job }}
      DAGSTER_CLOUD_CONFIG_JSON: ${{ inputs.config_json }}
      DAGSTER_CLOUD_RUN_TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
      DAGSTER_CLOUD_RUN_STATUS_INTERVAL_SECONDS: "15"
      DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS: "60"
      DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT: "SAFE_TERMINATE"
      HSA_STORAGE_BACKEND: "postgres"
      HSA_DATABASE_URL: ${{ secrets.HSA_DATABASE_URL }}
      HSA_CONTACT_EMAIL: "poppa@bradyandgraffiti.com"
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
      HSA_X_LINKED_ARTICLE_APPROVED_BY: "github-actions"
      HSA_X_LINKED_ARTICLE_APPROVAL_NOTE: "Manual smoke workflow dispatch for controlled x_linked_article follow-up."
      HSA_X_LINKED_ARTICLE_URLS: ${{ inputs.x_linked_article_urls }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Validate required secrets
        run: |
          if [ -z "$DAGSTER_PLUS_ENV_API_TOKEN" ]; then
            echo "::error::DAGSTER_PLUS_ENV_API_TOKEN is not configured."
            exit 1
          fi
          if [ -z "$HSA_DATABASE_URL" ]; then
            echo "::error::HSA_DATABASE_URL is not configured."
            exit 1
          fi
          if printf '%s' "$DAGSTER_CLOUD_CONFIG_JSON" | grep -q 'openrouter_'; then
            if [ -z "$OPENROUTER_API_KEY" ]; then
              echo "::error::OPENROUTER_API_KEY is required for OpenRouter review modes."
              exit 1
            fi
          fi
          if [ "$DAGSTER_CLOUD_JOB" = "x_topic_monitor_review_job" ] && [ -z "$TWITTERAPI_IO_KEY" ]; then
            echo "::error::TWITTERAPI_IO_KEY is required for x_topic_monitor_review_job."
            exit 1
          fi
        shell: bash

      - name: Install project dependencies
        run: uv sync

      - name: Launch smoke job
        id: launch
        timeout-minutes: 5
        run: |
          set -euo pipefail

          if [ "$DAGSTER_CLOUD_JOB" = "x_linked_article_followup_job" ] && [ -z "$DAGSTER_CLOUD_CONFIG_JSON" ] && [ -n "$HSA_X_LINKED_ARTICLE_URLS" ]; then
          DAGSTER_CLOUD_CONFIG_JSON="$(
          python - <<'PY'
          import json
          import os

          raw = os.environ["HSA_X_LINKED_ARTICLE_URLS"].strip()
          parsed = None
          if raw.startswith("["):
              try:
                  loaded = json.loads(raw)
              except json.JSONDecodeError:
                  loaded = None
              if isinstance(loaded, list):
                  parsed = [str(item).strip() for item in loaded if str(item).strip()]
          urls = parsed or [
              item.strip()
              for item in raw.replace("\n", ",").replace("\r", ",").split(",")
              if item.strip()
          ]
          config = {
              "ops": {
                  "x_linked_article_followup_report": {
                      "config": {
                          "urls": urls,
                          "approved_by": os.environ.get("HSA_X_LINKED_ARTICLE_APPROVED_BY"),
                          "approval_note": os.environ.get("HSA_X_LINKED_ARTICLE_APPROVAL_NOTE"),
                          "fetch": True,
                          "parse": True,
                      }
                  }
              }
          }
          print(json.dumps(config))
          PY
          )"
          fi

          launch_tags='{"github_workflow":"launch-dagster-smoke","github_run_id":"'"$GITHUB_RUN_ID"'","github_run_attempt":"'"$GITHUB_RUN_ATTEMPT"'","dagster_job":"'"$DAGSTER_CLOUD_JOB"'"}'
          launch_args=(
            uv run dagster-cloud job launch
            --api-token "$DAGSTER_PLUS_ENV_API_TOKEN"
            --organization "$DAGSTER_CLOUD_ORGANIZATION"
            --deployment "$DAGSTER_CLOUD_DEPLOYMENT"
            --location "$DAGSTER_CLOUD_LOCATION"
            --job "$DAGSTER_CLOUD_JOB"
            --tags "$launch_tags"
          )
          if [ -n "$DAGSTER_CLOUD_CONFIG_JSON" ]; then
            printf '%s' "$DAGSTER_CLOUD_CONFIG_JSON" | python -m json.tool >/dev/null
            launch_args+=(--config-json "$DAGSTER_CLOUD_CONFIG_JSON")
          fi

          set +e
          launch_output="$(
            timeout 5m "${launch_args[@]}" 2>&1
          )"
          launch_exit=$?
          set -e

          printf '%s\n' "$launch_output"

          if [ "$launch_exit" -ne 0 ]; then
            if [ "$launch_exit" -eq 124 ]; then
              echo "::error::Timed out after 5 minutes while launching Dagster job '$DAGSTER_CLOUD_JOB'."
            else
              echo "::error::Dagster job launch failed with exit code $launch_exit."
            fi
            exit "$launch_exit"
          fi

          run_id="$(printf '%s\n' "$launch_output" | grep -Eo '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' | tail -n 1 || true)"
          if [ -z "$run_id" ]; then
            echo "::error::Unable to parse Dagster run id from launch output."
            exit 1
          fi

          run_url="$DAGSTER_CLOUD_URL/$DAGSTER_CLOUD_DEPLOYMENT/runs/$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "DAGSTER_CLOUD_RUN_ID=$run_id" >> "$GITHUB_ENV"
          echo "Launched Dagster run: $run_id"
          echo "Dagster run URL: $run_url"

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "### Dagster smoke run"
              echo "- Job: \`$DAGSTER_CLOUD_JOB\`"
              echo "- Run ID: \`$run_id\`"
              echo "- URL: $run_url"
              if [ -n "$DAGSTER_CLOUD_CONFIG_JSON" ]; then
                echo "- Config JSON supplied: yes"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash

      - name: Wait for hosted smoke run
        timeout-minutes: 50
        run: |
          set -euo pipefail

          run_id="${DAGSTER_CLOUD_RUN_ID:?DAGSTER_CLOUD_RUN_ID was not set by the launch step}"
          timeout_seconds="$DAGSTER_CLOUD_RUN_TIMEOUT_SECONDS"
          interval_seconds="$DAGSTER_CLOUD_RUN_STATUS_INTERVAL_SECONDS"
          query_timeout_seconds="$DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS"
          deadline=$((SECONDS + timeout_seconds))
          run_url="$DAGSTER_CLOUD_URL/$DAGSTER_CLOUD_DEPLOYMENT/runs/$run_id"
          status="UNKNOWN"

          echo "Polling Dagster run $run_id for up to ${timeout_seconds}s every ${interval_seconds}s."
          echo "Each status query is capped at ${query_timeout_seconds}s."
          echo "Dagster run URL: $run_url"

          while true; do
            set +e
            status_output="$(
              timeout "${query_timeout_seconds}s" uv run dagster-cloud run status "$run_id" \
                --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
                --organization "$DAGSTER_CLOUD_ORGANIZATION" \
                --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
                2>&1
            )"
            status_exit=$?
            set -e

            if [ "$status_exit" -eq 0 ]; then
              status="$(printf '%s\n' "$status_output" | tr -d '\r' | awk 'NF {last=$0} END {print last}' | tr -d '[:space:]')"
              if [ -z "$status" ]; then
                status="UNKNOWN"
                echo "::warning::Dagster status query returned no status text."
              fi
            else
              status="UNKNOWN"
              if [ "$status_exit" -eq 124 ]; then
                echo "::warning::Dagster status query timed out after ${query_timeout_seconds}s."
              else
                echo "::warning::Dagster status query failed with exit code $status_exit."
              fi
              printf '%s\n' "$status_output"
            fi

            timestamp="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "[$timestamp] Dagster run $run_id status: $status"

            case "$status" in
              SUCCESS)
                echo "Dagster run $run_id finished successfully."
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  echo "- Final status: \`$status\`" >> "$GITHUB_STEP_SUMMARY"
                fi
                exit 0
                ;;
              FAILURE|CANCELED)
                echo "::error::Dagster run $run_id finished with terminal status $status."
                echo "Dagster run URL: $run_url"
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  echo "- Final status: \`$status\`" >> "$GITHUB_STEP_SUMMARY"
                fi
                exit 1
                ;;
            esac

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Timed out after ${timeout_seconds}s waiting for Dagster run $run_id. Last status: $status."
              echo "Dagster run URL: $run_url"
              echo "::warning::Requesting Dagster run termination with policy ${DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT}."
              uv run python .github/scripts/dagster_cloud_run_control.py \
                --url "$DAGSTER_CLOUD_URL" \
                --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
                --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
                --timeout-seconds "$DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS" \
                terminate \
                --run-id "$run_id" \
                --policy "$DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT" || true
              if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                echo "- Final status before timeout: \`$status\`" >> "$GITHUB_STEP_SUMMARY"
                echo "- Termination requested with policy: \`$DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT\`" >> "$GITHUB_STEP_SUMMARY"
              fi
              exit 124
            fi

            sleep "$interval_seconds"
          done
        shell: bash

      - name: Request hosted run termination after workflow failure
        if: ${{ always() && steps.launch.outputs.run_id != '' && (failure() || cancelled()) }}
        timeout-minutes: 2
        continue-on-error: true
        run: |
          set -euo pipefail
          uv run python .github/scripts/dagster_cloud_run_control.py \
            --url "$DAGSTER_CLOUD_URL" \
            --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
            --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
            --timeout-seconds "$DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS" \
            terminate \
            --run-id "$DAGSTER_CLOUD_RUN_ID" \
            --policy "$DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT"
        shell: bash

      - name: Print final hosted run status
        if: ${{ always() && steps.launch.outputs.run_id != '' }}
        run: |
          set -euo pipefail
          run_url="$DAGSTER_CLOUD_URL/$DAGSTER_CLOUD_DEPLOYMENT/runs/$DAGSTER_CLOUD_RUN_ID"
          echo "Dagster run URL: $run_url"
          timeout "${DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS}s" uv run dagster-cloud run status "$DAGSTER_CLOUD_RUN_ID" \
            --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
            --organization "$DAGSTER_CLOUD_ORGANIZATION" \
            --deployment "$DAGSTER_CLOUD_DEPLOYMENT" || true
        shell: bash

      - name: Print hosted embedding maintenance report
        if: ${{ inputs.job == 'embedding_maintenance_job' }}
        run: |
          uv run python -m hsa_research.ingestion_bridge.cli embedding-maintenance \
            --fail-on-error
        shell: bash

      - name: Print hosted retrieval smoke report
        if: ${{ inputs.job == 'embedding_index_job' || inputs.job == 'embedding_maintenance_job' }}
        run: |
          uv run python -m hsa_research.ingestion_bridge.cli retrieval-smoke \
            --query "hemangiosarcoma angiogenesis VEGFA" \
            --limit 3 \
            --require-embedding \
            --fail-on-error
        shell: bash

      - name: Print hosted full-text ops model-review summary
        if: ${{ always() && (inputs.job == 'full_text_ops_agent_job' || inputs.job == 'full_text_source_date_ops_job') }}
        continue-on-error: true
        run: |
          uv run python -m hsa_research.ingestion_bridge.cli model-review-summary \
            --agent-name full_text_ops_agent \
            --limit 3
        shell: bash

      - name: Print hosted X topic review summary
        if: ${{ always() && inputs.job == 'x_topic_monitor_review_job' }}
        continue-on-error: true
        run: |
          uv run python - <<'PY'
          import json

          from hsa_research.ingestion_bridge.service import HSAResearchService
          from hsa_research.ingestion_bridge.storage import build_research_repository

          service = HSAResearchService(build_research_repository())
          runs = service.list_agent_runs(
              agent_name="x_topic_review_agent",
              source_key="x_topic_monitor",
              limit=3,
          )
          summaries = []
          for run in runs:
              output = run.output_payload or {}
              evidence = output.get("evidence", {})
              summaries.append(
                  {
                      "agent_run_id": str(run.agent_run_id),
                      "status": run.status,
                      "completed_at": run.completed_at.isoformat() if run.completed_at else None,
                      "ingestion_candidate_count": output.get("ingestion_candidate_count", 0),
                      "needs_human_review_count": output.get("needs_human_review_count", 0),
                      "rejected_count": output.get("rejected_count", 0),
                      "model_reviews": evidence.get("model_reviews", [])[:5],
                      "openrouter_errors": evidence.get("openrouter_errors", [])[:5],
                      "recommendations": [
                          {
                              "post_id": action.get("source_record_id"),
                              "query_name": action.get("query_name"),
                              "action": action.get("action"),
                              "severity": action.get("severity"),
                              "reason": action.get("reason"),
                              "links": [
                                  {
                                      "url": link.get("url"),
                                      "recommended_source_key": link.get("recommended_source_key"),
                                      "identifier_type": link.get("identifier_type"),
                                      "identifier": link.get("identifier"),
                                      "should_ingest": link.get("should_ingest"),
                                  }
                                  for link in action.get("ingestible_links", [])
                              ],
                          }
                          for action in output.get("actions", [])[:20]
                      ],
                  }
              )
          print(json.dumps(summaries, indent=2, sort_keys=True))
          PY
        shell: bash

      - name: Print hosted X linked article follow-up summary
        if: ${{ always() && inputs.job == 'x_linked_article_followup_job' }}
        continue-on-error: true
        run: |
          uv run python - <<'PY'
          import json

          from hsa_research.ingestion_bridge.scraper_bridge import ScrapeBridge
          from hsa_research.ingestion_bridge.storage import build_research_repository

          repository = build_research_repository()
          reviews = ScrapeBridge(repository).list_reviews(
              "x_linked_article",
              review_status=None,
              limit=5,
          )
          print(
              json.dumps(
                  [
                      {
                          "review_id": str(review.review_id),
                          "artifact_id": str(review.artifact_id),
                          "title": review.title,
                          "canonical_url": review.canonical_url,
                          "review_status": review.review_status,
                          "parser_confidence": review.parser_confidence,
                          "primary_source_links": review.fields.get("primary_source_links", []),
                      }
                      for review in reviews
                  ],
                  indent=2,
                  sort_keys=True,
              )
          )
          PY
        shell: bash

      - name: Print hosted structured-source count report
        if: ${{ inputs.job == 'structured_source_smoke_job' || inputs.job == 'structured_source_multisource_smoke_job' || inputs.job == 'literature_clinical_smoke_job' || inputs.job == 'all_api_smoke_job' || inputs.job == 'literature_corpus_harvest_job' || inputs.job == 'literature_full_text_refresh_job' || inputs.job == 'europe_pmc_full_text_refresh_job' || inputs.job == 'pmc_oa_full_text_refresh_job' || inputs.job == 'literature_full_text_ingest_smoke_job' || inputs.job == 'europe_pmc_full_text_ingest_job' || inputs.job == 'pmc_oa_full_text_ingest_job' || inputs.job == 'literature_full_text_smoke_job' || inputs.job == 'full_text_source_date_ops_job' || inputs.job == 'structured_source_count_report_job' || inputs.job == 'source_health_report_job' || inputs.job == 'structured_source_pipeline_job' }}
        run: |
          validation_flags=""
          claim_flags=""
          sources=(
            pubchem
            chembl
            uniprot
            rcsb_pdb
            openfda_animal_events
            icdc
            geo
            sra
            openalex
            pubmed
            europe_pmc
            crossref
            pmc_oa
            clinicaltrials_gov
          )
          if [ "$DAGSTER_CLOUD_JOB" = "literature_corpus_harvest_job" ]; then
            sources=(openalex pubmed crossref)
          elif [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_refresh_job" ] || [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_ingest_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "full_text_source_date_ops_job" ]; then
            sources=(europe_pmc pmc_oa)
          elif [ "$DAGSTER_CLOUD_JOB" = "europe_pmc_full_text_refresh_job" ] || [ "$DAGSTER_CLOUD_JOB" = "europe_pmc_full_text_ingest_job" ]; then
            sources=(europe_pmc)
          elif [ "$DAGSTER_CLOUD_JOB" = "pmc_oa_full_text_refresh_job" ] || [ "$DAGSTER_CLOUD_JOB" = "pmc_oa_full_text_ingest_job" ]; then
            sources=(pmc_oa)
          fi
          if [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_ingest_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "europe_pmc_full_text_ingest_job" ] || [ "$DAGSTER_CLOUD_JOB" = "pmc_oa_full_text_ingest_job" ]; then
            claim_flags="--no-require-claims"
          fi
          if [ "$DAGSTER_CLOUD_JOB" = "literature_clinical_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "all_api_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "literature_corpus_harvest_job" ] || [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_refresh_job" ] || [ "$DAGSTER_CLOUD_JOB" = "europe_pmc_full_text_refresh_job" ] || [ "$DAGSTER_CLOUD_JOB" = "pmc_oa_full_text_refresh_job" ] || [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_ingest_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "europe_pmc_full_text_ingest_job" ] || [ "$DAGSTER_CLOUD_JOB" = "pmc_oa_full_text_ingest_job" ] || [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "full_text_source_date_ops_job" ] || [ "$DAGSTER_CLOUD_JOB" = "structured_source_count_report_job" ] || [ "$DAGSTER_CLOUD_JOB" = "source_health_report_job" ]; then
            validation_flags="--fail-on-failed-sources"
          fi
          source_args=()
          for source in "${sources[@]}"; do
            source_args+=(--source "$source")
          done
          uv run python -m hsa_research.ingestion_bridge.cli structured-report \
            "${source_args[@]}" \
            --sample-limit 2 \
            $claim_flags \
            $validation_flags
        shell: bash

      - name: Print hosted source health report
        if: ${{ inputs.job == 'all_api_smoke_job' || inputs.job == 'literature_corpus_harvest_job' || inputs.job == 'literature_full_text_refresh_job' || inputs.job == 'europe_pmc_full_text_refresh_job' || inputs.job == 'pmc_oa_full_text_refresh_job' || inputs.job == 'literature_full_text_ingest_smoke_job' || inputs.job == 'europe_pmc_full_text_ingest_job' || inputs.job == 'pmc_oa_full_text_ingest_job' || inputs.job == 'literature_full_text_smoke_job' || inputs.job == 'full_text_source_date_ops_job' || inputs.job == 'source_health_report_job' }}
        run: |
          sources=()
          claim_flags=""
          if [ "$DAGSTER_CLOUD_JOB" = "literature_corpus_harvest_job" ]; then
            sources=(openalex pubmed crossref)
          elif [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_refresh_job" ] || [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_ingest_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "full_text_source_date_ops_job" ]; then
            sources=(europe_pmc pmc_oa)
          elif [ "$DAGSTER_CLOUD_JOB" = "europe_pmc_full_text_refresh_job" ] || [ "$DAGSTER_CLOUD_JOB" = "europe_pmc_full_text_ingest_job" ]; then
            sources=(europe_pmc)
          elif [ "$DAGSTER_CLOUD_JOB" = "pmc_oa_full_text_refresh_job" ] || [ "$DAGSTER_CLOUD_JOB" = "pmc_oa_full_text_ingest_job" ]; then
            sources=(pmc_oa)
          fi
          if [ "$DAGSTER_CLOUD_JOB" = "literature_full_text_ingest_smoke_job" ] || [ "$DAGSTER_CLOUD_JOB" = "europe_pmc_full_text_ingest_job" ] || [ "$DAGSTER_CLOUD_JOB" = "pmc_oa_full_text_ingest_job" ]; then
            claim_flags="--no-require-claims"
          fi
          source_args=()
          for source in "${sources[@]}"; do
            source_args+=(--source "$source")
          done
          uv run python -m hsa_research.ingestion_bridge.cli source-health \
            "${source_args[@]}" \
            --sample-limit 2 \
            $claim_flags \
            --fail-on-failed-sources
        shell: bash
