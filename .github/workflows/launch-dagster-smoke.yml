name: Launch Dagster Smoke Job

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Dagster job to launch"
        type: choice
        required: true
        default: "structured_source_smoke_job"
        options:
          - "structured_source_smoke_job"
          - "structured_source_multisource_smoke_job"
          - "literature_clinical_smoke_job"
          - "all_api_smoke_job"
          - "literature_corpus_harvest_job"
          - "literature_full_text_refresh_job"
          - "europe_pmc_full_text_refresh_job"
          - "pmc_oa_full_text_refresh_job"
          - "literature_full_text_ingest_smoke_job"
          - "europe_pmc_full_text_ingest_job"
          - "pmc_oa_full_text_ingest_job"
          - "literature_full_text_smoke_job"
          - "structured_source_count_report_job"
          - "research_primitive_source_smoke_job"
          - "research_primitive_source_pipeline_job"
          - "entity_lookup_index_job"
          - "source_health_report_job"
          - "command_center_job"
          - "full_text_ops_agent_job"
          - "agent_performance_report_job"
          - "agent_performance_evaluation_job"
          - "reward_event_report_job"
          - "reward_event_sync_job"
          - "research_program_board_job"
          - "research_program_library_job"
          - "research_program_evidence_loop_job"
          - "research_workspace_neon_job"
          - "research_workspace_library_job"
          - "research_workspace_cleanup_job"
          - "omics_accession_hunt_job"
          - "omics_evidence_packet_job"
          - "omics_readout_job"
          - "omics_locus_signal_job"
          - "omics_followup_job"
          - "research_brief_agent_job"
          - "therapy_committee_job"
          - "therapy_committee_validation_queue_job"
          - "research_brief_library_job"
          - "research_brief_evaluation_job"
          - "research_brief_evaluation_library_job"
          - "research_brief_quality_job"
          - "research_brief_followup_queue_job"
          - "validation_plan_job"
          - "validation_plan_library_job"
          - "validation_request_queue_job"
          - "validation_request_queue_library_job"
          - "md_smoke_compute_job_job"
          - "compute_job_job"
          - "md_expert_review_packet_job"
          - "md_expert_agent_review_job"
          - "research_brief_queue_job"
          - "research_brief_queue_batch_job"
          - "research_brief_queue_seed_job"
          - "research_brief_queue_runner_job"
          - "research_brief_queue_maintenance_job"
          - "research_brief_playground_pack_job"
          - "research_leads_job"
          - "evidence_gap_resolver_job"
          - "validation_gap_source_pack_job"
          - "validation_gap_source_ingest_job"
          - "validation_gap_completion_job"
          - "research_followup_resolver_job"
          - "x_topic_monitor_review_job"
          - "x_linked_article_followup_job"
          - "x_linked_article_review_job"
          - "source_followup_queue_job"
          - "source_followup_ingest_job"
          - "pubmed_source_followup_ingest_job"
          - "crossref_source_followup_ingest_job"
          - "pmc_oa_source_followup_ingest_job"
          - "clinicaltrials_gov_source_followup_ingest_job"
          - "unpaywall_source_followup_ingest_job"
          - "full_text_source_date_ops_job"
          - "entity_resolution_job"
          - "embedding_index_job"
          - "embedding_maintenance_job"
          - "structured_source_pipeline_job"
          - "candidate_contribution_intake_report_job"
          - "candidate_contribution_triage_job"
          - "public_candidate_snapshot_job"
          - "public_candidate_integrity_job"
      config_json:
        description: "Optional Dagster run config JSON"
        type: string
        required: false
        default: ""
      timeout_seconds:
        description: "Maximum seconds to wait for the Dagster run before failing and requesting termination"
        type: string
        required: true
        default: "2700"
      deployment:
        description: "Dagster Cloud deployment to launch against"
        type: string
        required: true
        default: "prod"
      location:
        description: "Dagster Cloud code location to launch against"
        type: string
        required: true
        default: "twog"
      x_linked_article_urls:
        description: "Optional comma/newline/JSON-list URLs for x_linked_article_followup_job manual validation"
        type: string
        required: false
        default: ""

jobs:
  launch_dagster_smoke:
    name: Launch Dagster Smoke Job
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      DAGSTER_CLOUD_ORGANIZATION: "twogbio"
      DAGSTER_CLOUD_URL: "https://twogbio.dagster.cloud"
      DAGSTER_CLOUD_DEPLOYMENT: ${{ inputs.deployment }}
      DAGSTER_PLUS_ENV_API_TOKEN: ${{ secrets.DAGSTER_PLUS_ENV_API_TOKEN }}
      DAGSTER_CLOUD_LOCATION: ${{ inputs.location }}
      DAGSTER_CLOUD_JOB: ${{ inputs.job }}
      DAGSTER_CLOUD_CONFIG_JSON: ${{ inputs.config_json }}
      DAGSTER_CLOUD_RUN_TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
      DAGSTER_CLOUD_RUN_STATUS_INTERVAL_SECONDS: "15"
      DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS: "60"
      DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT: "SAFE_TERMINATE"
      HSA_STORAGE_BACKEND: "postgres"
      HSA_DATABASE_URL: ${{ secrets.HSA_DATABASE_URL }}
      HSA_CONTACT_EMAIL: "poppa@bradyandgraffiti.com"
      HSA_EMBEDDING_MODEL: "openrouter:openai/text-embedding-3-large"
      HSA_THERAPY_COMMITTEE_TIMEOUT_SECONDS: "60"
      HSA_THERAPY_COMMITTEE_MAX_TOKENS: "3500"
      HSA_THERAPY_COMMITTEE_WORKERS: "4"
      HSA_THERAPY_COMMITTEE_MODEL: "anthropic/claude-sonnet-4.6"
      HSA_RESEARCH_BRIEF_MODEL: "anthropic/claude-sonnet-4.6"
      HSA_BIG_IDEA_OPENROUTER_MODEL: "~anthropic/claude-opus-latest"
      HSA_RESEARCH_PROGRAM_BOARD_MODEL: "~anthropic/claude-opus-latest"
      RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
      HSA_RUNPOD_ENDPOINT_ID: ${{ secrets.HSA_RUNPOD_ENDPOINT_ID }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
      HSA_X_LINKED_ARTICLE_APPROVED_BY: "github-actions"
      HSA_X_LINKED_ARTICLE_APPROVAL_NOTE: "Manual smoke workflow dispatch for controlled x_linked_article follow-up."
      HSA_X_LINKED_ARTICLE_URLS: ${{ inputs.x_linked_article_urls }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Validate required secrets
        run: |
          if [ -z "$DAGSTER_PLUS_ENV_API_TOKEN" ]; then
            echo "::error::DAGSTER_PLUS_ENV_API_TOKEN is not configured."
            exit 1
          fi
          if [ -z "$HSA_DATABASE_URL" ]; then
            echo "::error::HSA_DATABASE_URL is not configured."
            exit 1
          fi
          if printf '%s' "$DAGSTER_CLOUD_CONFIG_JSON" | grep -q 'openrouter_'; then
            if [ -z "$OPENROUTER_API_KEY" ]; then
              echo "::error::OPENROUTER_API_KEY is required for OpenRouter review modes."
              exit 1
            fi
          fi
          if [ "$DAGSTER_CLOUD_JOB" = "research_program_board_job" ] && [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY is required for research_program_board_job."
            exit 1
          fi
          if [ "$DAGSTER_CLOUD_JOB" = "x_topic_monitor_review_job" ] && [ -z "$TWITTERAPI_IO_KEY" ]; then
            echo "::error::TWITTERAPI_IO_KEY is required for x_topic_monitor_review_job."
            exit 1
          fi
          if [ "$DAGSTER_CLOUD_JOB" = "compute_job_job" ] && printf '%s' "$DAGSTER_CLOUD_CONFIG_JSON" | grep -q '"dry_run"[[:space:]]*:[[:space:]]*false'; then
            if [ -z "$RUNPOD_API_KEY" ] || [ -z "$HSA_RUNPOD_ENDPOINT_ID" ]; then
              echo "::error::RUNPOD_API_KEY and HSA_RUNPOD_ENDPOINT_ID are required for live compute_job_job submissions."
              exit 1
            fi
          fi
          if [ "$DAGSTER_CLOUD_JOB" = "research_workspace_neon_job" ] && printf '%s' "$DAGSTER_CLOUD_CONFIG_JSON" | grep -q '"dry_run"[[:space:]]*:[[:space:]]*false'; then
            if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
              echo "::error::NEON_API_KEY and NEON_PROJECT_ID are required for live research_workspace_neon_job submissions."
              exit 1
            fi
          fi
          if [ "$DAGSTER_CLOUD_JOB" = "research_workspace_cleanup_job" ] && printf '%s' "$DAGSTER_CLOUD_CONFIG_JSON" | grep -q '"dry_run"[[:space:]]*:[[:space:]]*false'; then
            if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
              echo "::error::NEON_API_KEY and NEON_PROJECT_ID are required for live research_workspace_cleanup_job submissions."
              exit 1
            fi
          fi
        shell: bash

      - name: Install project dependencies
        run: uv sync

      - name: Verify hosted Dagster job registration
        id: verify_job
        timeout-minutes: 5
        run: |
          set -euo pipefail

          code_locations_json="$(
            uv run dg api code-location list \
              --organization "$DAGSTER_CLOUD_ORGANIZATION" \
              --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
              --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
              --json
          )"
          jobs_json="$(
            uv run dg api job list \
              --organization "$DAGSTER_CLOUD_ORGANIZATION" \
              --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
              --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
              --json
          )"

          printf '%s' "$code_locations_json" > /tmp/dagster_code_locations.json
          printf '%s' "$jobs_json" > /tmp/dagster_jobs.json

          python - <<'PY'
          import difflib
          import json
          import os
          import sys

          requested_job = os.environ["DAGSTER_CLOUD_JOB"]
          requested_location = os.environ["DAGSTER_CLOUD_LOCATION"]

          with open("/tmp/dagster_code_locations.json", "r", encoding="utf-8") as handle:
              code_locations = json.load(handle)
          with open("/tmp/dagster_jobs.json", "r", encoding="utf-8") as handle:
              jobs = json.load(handle)

          locations = code_locations.get("items", [])
          job_items = jobs.get("items", [])
          job_names = sorted(str(item.get("name") or "") for item in job_items)
          matching_jobs = [item for item in job_items if str(item.get("name") or "") == requested_job]
          found_job = any(name == requested_job for name in job_names)
          found_location = any(
              str(item.get("location_name") or "") == requested_location for item in locations
          )
          matching_origins = sorted(
              str(item.get("repository_origin") or "") for item in matching_jobs
          )
          matching_origins = [origin for origin in matching_origins if origin]
          found_job_in_location = (
              found_job
              if not matching_origins
              else any(requested_location in origin for origin in matching_origins)
          )

          print("Registered Dagster code locations:")
          for item in locations:
              source = item.get("code_source") or {}
              print(
                  "- {name} status={status} module={module}".format(
                      name=item.get("location_name"),
                      status=item.get("status"),
                      module=source.get("module_name") or source.get("autoload_defs_module_name"),
                  )
              )

          print(f"Registered Dagster jobs: {len(job_names)}")
          if requested_job in job_names:
              print(f"Requested job is registered: {requested_job}")
              if matching_origins:
                  print("Requested job repository origins:")
                  for origin in matching_origins:
                      print(f"- {origin}")
          else:
              matches = difflib.get_close_matches(requested_job, job_names, n=8, cutoff=0.2)
              print(f"::error::Requested Dagster job is not registered: {requested_job}")
              if matches:
                  print("Closest registered job names:")
                  for name in matches:
                      print(f"- {name}")
              else:
                  print("No similar registered job names found.")
              print("First 40 registered job names:")
              for name in job_names[:40]:
                  print(f"- {name}")

          if not found_location:
              print(f"::error::Requested Dagster code location is not registered: {requested_location}")
          if found_job and not found_job_in_location:
              print(
                  "::error::Requested Dagster job is registered, but not in the requested "
                  f"code location: {requested_location}"
              )

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("### Hosted Dagster registration\n")
                  summary.write(f"- Requested location: `{requested_location}`\n")
                  summary.write(f"- Requested job: `{requested_job}`\n")
                  summary.write(f"- Code locations: `{len(locations)}`\n")
                  summary.write(f"- Jobs: `{len(job_names)}`\n")
                  summary.write(f"- Job registered: `{found_job}`\n")
                  summary.write(f"- Location registered: `{found_location}`\n")
                  summary.write(f"- Job registered in location: `{found_job_in_location}`\n")

          if not found_job or not found_location or not found_job_in_location:
              sys.exit(1)
          PY
        shell: bash

      - name: Launch smoke job
        id: launch
        timeout-minutes: 5
        run: |
          set -euo pipefail

          if [ "$DAGSTER_CLOUD_JOB" = "x_linked_article_followup_job" ] && [ -z "$DAGSTER_CLOUD_CONFIG_JSON" ] && [ -n "$HSA_X_LINKED_ARTICLE_URLS" ]; then
          DAGSTER_CLOUD_CONFIG_JSON="$(
          python - <<'PY'
          import json
          import os

          raw = os.environ["HSA_X_LINKED_ARTICLE_URLS"].strip()
          parsed = None
          if raw.startswith("["):
              try:
                  loaded = json.loads(raw)
              except json.JSONDecodeError:
                  loaded = None
              if isinstance(loaded, list):
                  parsed = [str(item).strip() for item in loaded if str(item).strip()]
          urls = parsed or [
              item.strip()
              for item in raw.replace("\n", ",").replace("\r", ",").split(",")
              if item.strip()
          ]
          config = {
              "ops": {
                  "x_linked_article_followup_report": {
                      "config": {
                          "urls": urls,
                          "approved_by": os.environ.get("HSA_X_LINKED_ARTICLE_APPROVED_BY"),
                          "approval_note": os.environ.get("HSA_X_LINKED_ARTICLE_APPROVAL_NOTE"),
                          "fetch": True,
                          "parse": True,
                      }
                  }
              }
          }
          print(json.dumps(config))
          PY
          )"
          fi

          launch_tags='{"github_workflow":"launch-dagster-smoke","github_run_id":"'"$GITHUB_RUN_ID"'","github_run_attempt":"'"$GITHUB_RUN_ATTEMPT"'","dagster_job":"'"$DAGSTER_CLOUD_JOB"'"}'
          launch_args=(
            uv run dagster-cloud job launch
            --api-token "$DAGSTER_PLUS_ENV_API_TOKEN"
            --organization "$DAGSTER_CLOUD_ORGANIZATION"
            --deployment "$DAGSTER_CLOUD_DEPLOYMENT"
            --location "$DAGSTER_CLOUD_LOCATION"
            --job "$DAGSTER_CLOUD_JOB"
            --tags "$launch_tags"
          )
          if [ -n "$DAGSTER_CLOUD_CONFIG_JSON" ]; then
            printf '%s' "$DAGSTER_CLOUD_CONFIG_JSON" | python -m json.tool >/dev/null
            launch_args+=(--config-json "$DAGSTER_CLOUD_CONFIG_JSON")
          fi

          set +e
          launch_output="$(
            timeout 5m "${launch_args[@]}" 2>&1
          )"
          launch_exit=$?
          set -e

          printf '%s\n' "$launch_output"

          if [ "$launch_exit" -ne 0 ]; then
            if [ "$launch_exit" -eq 124 ]; then
              echo "::error::Timed out after 5 minutes while launching Dagster job '$DAGSTER_CLOUD_JOB'."
            else
              echo "::error::Dagster job launch failed with exit code $launch_exit."
            fi
            exit "$launch_exit"
          fi

          run_id="$(printf '%s\n' "$launch_output" | grep -Eo '[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' | tail -n 1 || true)"
          if [ -z "$run_id" ]; then
            echo "::error::Unable to parse Dagster run id from launch output."
            exit 1
          fi

          run_url="$DAGSTER_CLOUD_URL/$DAGSTER_CLOUD_DEPLOYMENT/runs/$run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "DAGSTER_CLOUD_RUN_ID=$run_id" >> "$GITHUB_ENV"
          echo "Launched Dagster run: $run_id"
          echo "Dagster run URL: $run_url"

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "### Dagster smoke run"
              echo "- Job: \`$DAGSTER_CLOUD_JOB\`"
              echo "- Run ID: \`$run_id\`"
              echo "- URL: $run_url"
              if [ -n "$DAGSTER_CLOUD_CONFIG_JSON" ]; then
                echo "- Config JSON supplied: yes"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash

      - name: Wait for hosted smoke run
        timeout-minutes: 50
        run: |
          set -euo pipefail

          run_id="${DAGSTER_CLOUD_RUN_ID:?DAGSTER_CLOUD_RUN_ID was not set by the launch step}"
          timeout_seconds="$DAGSTER_CLOUD_RUN_TIMEOUT_SECONDS"
          interval_seconds="$DAGSTER_CLOUD_RUN_STATUS_INTERVAL_SECONDS"
          query_timeout_seconds="$DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS"
          deadline=$((SECONDS + timeout_seconds))
          run_url="$DAGSTER_CLOUD_URL/$DAGSTER_CLOUD_DEPLOYMENT/runs/$run_id"
          status="UNKNOWN"

          echo "Polling Dagster run $run_id for up to ${timeout_seconds}s every ${interval_seconds}s."
          echo "Each status query is capped at ${query_timeout_seconds}s."
          echo "Dagster run URL: $run_url"

          while true; do
            set +e
            status_output="$(
              timeout "${query_timeout_seconds}s" uv run dagster-cloud run status "$run_id" \
                --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
                --organization "$DAGSTER_CLOUD_ORGANIZATION" \
                --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
                2>&1
            )"
            status_exit=$?
            set -e

            if [ "$status_exit" -eq 0 ]; then
              status="$(printf '%s\n' "$status_output" | tr -d '\r' | awk 'NF {last=$0} END {print last}' | tr -d '[:space:]')"
              if [ -z "$status" ]; then
                status="UNKNOWN"
                echo "::warning::Dagster status query returned no status text."
              fi
            else
              status="UNKNOWN"
              if [ "$status_exit" -eq 124 ]; then
                echo "::warning::Dagster status query timed out after ${query_timeout_seconds}s."
              else
                echo "::warning::Dagster status query failed with exit code $status_exit."
              fi
              printf '%s\n' "$status_output"
            fi

            timestamp="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "[$timestamp] Dagster run $run_id status: $status"

            case "$status" in
              SUCCESS)
                echo "Dagster run $run_id finished successfully."
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  echo "- Final status: \`$status\`" >> "$GITHUB_STEP_SUMMARY"
                fi
                exit 0
                ;;
              FAILURE|CANCELED)
                echo "::error::Dagster run $run_id finished with terminal status $status."
                echo "Dagster run URL: $run_url"
                if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                  echo "- Final status: \`$status\`" >> "$GITHUB_STEP_SUMMARY"
                fi
                exit 1
                ;;
            esac

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Timed out after ${timeout_seconds}s waiting for Dagster run $run_id. Last status: $status."
              echo "Dagster run URL: $run_url"
              echo "::warning::Requesting Dagster run termination with policy ${DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT}."
              uv run python .github/scripts/dagster_cloud_run_control.py \
                --url "$DAGSTER_CLOUD_URL" \
                --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
                --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
                --timeout-seconds "$DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS" \
                terminate \
                --run-id "$run_id" \
                --policy "$DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT" || true
              if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                echo "- Final status before timeout: \`$status\`" >> "$GITHUB_STEP_SUMMARY"
                echo "- Termination requested with policy: \`$DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT\`" >> "$GITHUB_STEP_SUMMARY"
              fi
              exit 124
            fi

            sleep "$interval_seconds"
          done
        shell: bash

      - name: Request hosted run termination after workflow failure
        if: ${{ always() && steps.launch.outputs.run_id != '' && (failure() || cancelled()) }}
        timeout-minutes: 2
        continue-on-error: true
        run: |
          set -euo pipefail
          uv run python .github/scripts/dagster_cloud_run_control.py \
            --url "$DAGSTER_CLOUD_URL" \
            --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
            --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
            --timeout-seconds "$DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS" \
            terminate \
            --run-id "$DAGSTER_CLOUD_RUN_ID" \
            --policy "$DAGSTER_CLOUD_TERMINATE_POLICY_ON_TIMEOUT"
        shell: bash

      - name: Print final hosted run status
        if: ${{ always() && steps.launch.outputs.run_id != '' }}
        run: |
          set -euo pipefail
          run_url="$DAGSTER_CLOUD_URL/$DAGSTER_CLOUD_DEPLOYMENT/runs/$DAGSTER_CLOUD_RUN_ID"
          echo "Dagster run URL: $run_url"
          timeout "${DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS}s" uv run dagster-cloud run status "$DAGSTER_CLOUD_RUN_ID" \
            --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
                --organization "$DAGSTER_CLOUD_ORGANIZATION" \
                --deployment "$DAGSTER_CLOUD_DEPLOYMENT" || true
        shell: bash

      - name: Print hosted Dagster event diagnostics
        if: ${{ always() && steps.launch.outputs.run_id != '' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          uv run python .github/scripts/dagster_cloud_run_control.py \
            --url "$DAGSTER_CLOUD_URL" \
            --api-token "$DAGSTER_PLUS_ENV_API_TOKEN" \
            --deployment "$DAGSTER_CLOUD_DEPLOYMENT" \
            --timeout-seconds "$DAGSTER_CLOUD_RUN_STATUS_QUERY_TIMEOUT_SECONDS" \
            events \
            --run-id "$DAGSTER_CLOUD_RUN_ID" \
            --limit 500 \
            --tail 40
        shell: bash

      - name: Print hosted research workspace summary
        if: ${{ always() && (inputs.job == 'research_workspace_neon_job' || inputs.job == 'research_workspace_library_job' || inputs.job == 'research_workspace_cleanup_job') }}
        continue-on-error: true
        run: |
          uv run python - <<'PY'
          import json
          import os

          from hsa_research.ingestion_bridge.contracts import ResearchWorkspaceCleanupRequest, ResearchWorkspaceLibraryRequest
          from hsa_research.ingestion_bridge.service import HSAResearchService
          from hsa_research.ingestion_bridge.storage import build_research_repository

          def _op_config() -> dict:
              try:
                  config = json.loads(os.getenv("DAGSTER_CLOUD_CONFIG_JSON") or "{}")
              except json.JSONDecodeError:
                  return {}
              ops = config.get("ops") if isinstance(config.get("ops"), dict) else {}
              for op_name in ("research_workspace_neon_report", "research_workspace_library_report", "research_workspace_cleanup_report"):
                  op_payload = ops.get(op_name)
                  if isinstance(op_payload, dict) and isinstance(op_payload.get("config"), dict):
                      return op_payload["config"]
              for op_payload in ops.values():
                  if isinstance(op_payload, dict) and isinstance(op_payload.get("config"), dict):
                      return op_payload["config"]
              return {}

          config = _op_config()
          provider = config.get("provider") or "neon"
          service = HSAResearchService(build_research_repository())
          result = service.list_research_workspaces(
              ResearchWorkspaceLibraryRequest(
                  candidate_id=config.get("candidate_id"),
                  work_packet_id=config.get("work_packet_id"),
                  provider=provider,
                  include_expired=True,
                  limit=int(config.get("limit") or 10),
              )
          )
          rows = []
          for workspace in result.workspaces:
              metadata = workspace.metadata or {}
              rows.append(
                  {
                      "workspace_id": str(workspace.workspace_id),
                      "candidate_id": workspace.candidate_id,
                      "work_packet_id": workspace.work_packet_id,
                      "provider": workspace.provider,
                      "status": workspace.status,
                      "skill_profile": workspace.skill_profile,
                      "neon_branch_name": workspace.neon_branch_name,
                      "neon_branch_id": workspace.neon_branch_id,
                      "neon_parent_branch": workspace.neon_parent_branch,
                      "endpoint_id": metadata.get("endpoint_id"),
                      "database_secret_ref": workspace.database_secret_ref,
                      "branch_created": metadata.get("branch_created"),
                      "branch_reused": metadata.get("branch_reused"),
                      "expires_at": workspace.expires_at.isoformat() if workspace.expires_at else None,
                      "error_count": len(workspace.errors or []),
                      "created_at": workspace.created_at.isoformat(),
                      "updated_at": workspace.updated_at.isoformat(),
                  }
              )

          cleanup_preview = None
          if os.getenv("DAGSTER_CLOUD_JOB") == "research_workspace_cleanup_job":
              preview = service.cleanup_research_workspaces(
                  ResearchWorkspaceCleanupRequest(
                      workspace_id=config.get("workspace_id"),
                      candidate_id=config.get("candidate_id"),
                      work_packet_id=config.get("work_packet_id"),
                      provider=provider,
                      expired_before=config.get("expired_before"),
                      limit=int(config.get("limit") or 10),
                      reason=config.get("reason") or "hosted_cleanup_summary",
                      dry_run=True,
                      metadata={"github_summary": True},
                  )
              )
              cleanup_preview = {
                  "candidate_count": preview.candidate_count,
                  "skipped_count": preview.skipped_count,
                  "deleted_count": preview.deleted_count,
                  "updated_count": preview.updated_count,
                  "errors": preview.errors,
                  "candidate_branch_ids": [
                      candidate.workspace.neon_branch_id for candidate in preview.candidates
                  ],
                  "skipped": [
                      {
                          "workspace_id": str(candidate.workspace.workspace_id),
                          "branch_id": candidate.workspace.neon_branch_id,
                          "reason": candidate.reason,
                      }
                      for candidate in preview.skipped
                  ],
              }

          payload = {
              "dagster_run_id": os.getenv("DAGSTER_CLOUD_RUN_ID"),
              "query": {
                  "candidate_id": config.get("candidate_id"),
                  "work_packet_id": config.get("work_packet_id"),
                  "provider": provider,
              },
              "workspace_count": result.workspace_count,
              "status_counts": result.status_counts,
              "provider_counts": result.provider_counts,
              "workspaces": rows,
              "cleanup_preview": cleanup_preview,
          }
          print(json.dumps(payload, indent=2, sort_keys=True))

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("## Hosted research workspace summary\n\n")
                  summary.write("```json\n")
                  summary.write(json.dumps(payload, indent=2, sort_keys=True))
                  summary.write("\n```\n")
          PY
        shell: bash

