              ],
              "research_leads": [
                  {
                      "lead_id": str(lead.lead_id),
                      "status": lead.status,
                      "priority": lead.priority,
                      "source_key": lead.source_key,
                      "title": (lead.title or "")[:300],
                      "suggested_sources": lead.suggested_sources,
