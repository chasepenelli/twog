name: Validate Hosted Postgres

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Structured source key to run"
        required: true
        default: "pubchem"
      limit:
        description: "Maximum records per active query"
        required: true
        default: "1"

jobs:
  validate_hosted_postgres:
    name: Validate Hosted Postgres
    runs-on: ubuntu-22.04
    env:
      HSA_STORAGE_BACKEND: "postgres"
      HSA_DATABASE_URL: ${{ secrets.HSA_DATABASE_URL }}
      HSA_CONTACT_EMAIL: "poppa@bradyandgraffiti.com"
      SOURCE: ${{ inputs.source }}
      LIMIT: ${{ inputs.limit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Validate required secrets
        run: |
          if [ -z "$HSA_DATABASE_URL" ]; then
            echo "::error::HSA_DATABASE_URL is not configured as a GitHub Actions secret."
            exit 1
          fi
        shell: bash

      - name: Install project dependencies
        run: uv sync

      - name: Run structured source pipeline against hosted Postgres
        run: |
          uv run python -m hsa_research.ingestion_bridge.cli structured-pipeline \
            --source "$SOURCE" \
            --limit "$LIMIT" \
            --extract-limit 50 \
            --curate-limit 50
        shell: bash
